name: Создание и проверка пользователя
base_url: http://127.0.0.1:8000/
user_id_not_found: 1234567890

steps:
  - name: Create user
    request:
      method: POST
      url: /users
      json:
        name: "Ivan"
        email: "ivan@example.com"
    expect:
      status: 200
    extract:
      user_id: null


  - name: Get user
    request:
      method: GET
      url: "/users/{{user_id}}"
      timeout: 10
    expect:
      status: 200
      json:
        name: "Ivan"
        email: "ivan@example.com"


  - name: Delete existing user
    request:
      method: DELETE
      url: "/users/{{user_id}}"
    expect:
      status: 200
      json:
        status: User deleted


  - name: Delete non-existing user
    request:
      method: DELETE
      url: "/users/{{user_id_not_found}}"
    expect:
      status: 404
      json:
        detail: User not found