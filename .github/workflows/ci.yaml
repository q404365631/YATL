name: Check linters, formatters, tests

on: [push, pull_request, workflow_dispatch]

jobs:
  formatters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14

      - name: install ruff
        run: pip install ruff

      - name: run ruff check
        run: ruff check .
      
      - name: run ruff format
        run: ruff format .
      
      
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.14

      - name: install poetry
        run: pip install poetry

      - name: install dependencies
        run: poetry install

      - name: run tests
        run: poetry run python3 src/yatl/parser.py

